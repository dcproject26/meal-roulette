<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Roulette - What's for Dinner?</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        const { Utensils, RotateCw, Plus, X, Coffee, Sun, Moon, ChevronDown, ChevronUp, Sparkles, ShoppingCart, BookOpen, Heart, Ban, History, Settings, Share2, Clock, Flame } = lucide;
function MealRoulette() {
  const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  
  const [weeklyMeals, setWeeklyMeals] = useState({
    Monday: { breakfast: [], lunch: [], dinner: [] },
    Tuesday: { breakfast: [], lunch: [], dinner: [] },
    Wednesday: { breakfast: [], lunch: [], dinner: [] },
    Thursday: { breakfast: [], lunch: [], dinner: [] },
    Friday: { breakfast: [], lunch: [], dinner: [] },
    Saturday: { breakfast: [], lunch: [], dinner: [] },
    Sunday: { breakfast: [], lunch: [], dinner: [] }
  });
  
  const [expandedDay, setExpandedDay] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const [selectedMeal, setSelectedMeal] = useState(null);
  const [mealType, setMealType] = useState('breakfast');
  const [showConfetti, setShowConfetti] = useState(false);
  const [showInputSection, setShowInputSection] = useState(true);
  const [groceries, setGroceries] = useState('');
  const [showGroceryInput, setShowGroceryInput] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [wheelRotation, setWheelRotation] = useState(0);
  const [aiSuggestions, setAiSuggestions] = useState({ breakfast: [], lunch: [], dinner: [] });
  const [showAiSuggestions, setShowAiSuggestions] = useState(false);
  
  // Feature states
  const [mealHistory, setMealHistory] = useState([]);
  const [favorites, setFavorites] = useState([]);
  const [excludeList, setExcludeList] = useState([]);
  const [dietaryFilter, setDietaryFilter] = useState('all');
  const [showHistory, setShowHistory] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [shareUrl, setShareUrl] = useState('');
  const [showShareDialog, setShowShareDialog] = useState(false);
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [showRecipeModal, setShowRecipeModal] = useState(false);
  const [loadingRecipe, setLoadingRecipe] = useState(false);

  // Load data from localStorage on mount
  useEffect(() => {
    const savedMeals = localStorage.getItem('weeklyMeals');
    const savedHistory = localStorage.getItem('mealHistory');
    const savedFavorites = localStorage.getItem('favorites');
    const savedExcludeList = localStorage.getItem('excludeList');
    
    if (savedMeals) setWeeklyMeals(JSON.parse(savedMeals));
    if (savedHistory) setMealHistory(JSON.parse(savedHistory));
    if (savedFavorites) setFavorites(JSON.parse(savedFavorites));
    if (savedExcludeList) setExcludeList(JSON.parse(savedExcludeList));
  }, []);

  // Save to localStorage whenever data changes
  useEffect(() => {
    localStorage.setItem('weeklyMeals', JSON.stringify(weeklyMeals));
  }, [weeklyMeals]);

  useEffect(() => {
    localStorage.setItem('mealHistory', JSON.stringify(mealHistory));
  }, [mealHistory]);

  useEffect(() => {
    localStorage.setItem('favorites', JSON.stringify(favorites));
  }, [favorites]);

  useEffect(() => {
    localStorage.setItem('excludeList', JSON.stringify(excludeList));
  }, [excludeList]);

  const colors = {
    breakfast: '#FF6B9D',
    lunch: '#FFA62B',
    dinner: '#845EC2'
  };

  const gradients = {
    breakfast: 'linear-gradient(135deg, #FF6B9D 0%, #FFB88C 100%)',
    lunch: 'linear-gradient(135deg, #FFA62B 0%, #FFD93D 100%)',
    dinner: 'linear-gradient(135deg, #845EC2 0%, #D65DB1 100%)'
  };

  // Common dish suggestions
  const commonDishes = {
    breakfast: [
      'Pancakes', 'Waffles', 'French Toast', 'Omelette', 'Scrambled Eggs',
      'Avocado Toast', 'Smoothie Bowl', 'Cereal', 'Bagel & Cream Cheese',
      'Breakfast Burrito', 'Porridge', 'Granola & Yogurt', 'Poha', 'Upma',
      'Idli & Sambar', 'Dosa', 'Paratha', 'Aloo Puri', 'Bread Pakora'
    ],
    lunch: [
      'Caesar Salad', 'Pasta Carbonara', 'Fried Rice', 'Tacos', 'Burrito Bowl',
      'Grilled Chicken Sandwich', 'Poke Bowl', 'Ramen', 'Pad Thai', 'Pizza',
      'Dal Rice', 'Chole Bhature', 'Rajma Chawal', 'Biryani', 'Pulao',
      'Veg Thali', 'Paneer Tikka', 'Butter Chicken', 'Noodles', 'Burger'
    ],
    dinner: [
      'Grilled Salmon', 'Steak & Potatoes', 'Spaghetti Bolognese', 'Curry & Rice',
      'Stir Fry', 'Roast Chicken', 'Fish Tacos', 'Lasagna', 'Soup & Bread',
      'Shawarma', 'Palak Paneer', 'Kadai Chicken', 'Mutton Curry', 'Fish Curry',
      'Veg Biryani', 'Tandoori Chicken', 'Khichdi', 'Momos', 'Fried Fish', 'Kebabs'
    ]
  };

  // Toggle favorite
  const toggleFavorite = (meal) => {
    setFavorites(prev => 
      prev.includes(meal) ? prev.filter(m => m !== meal) : [...prev, meal]
    );
  };

  // Toggle exclude
  const toggleExclude = (meal) => {
    setExcludeList(prev => 
      prev.includes(meal) ? prev.filter(m => m !== meal) : [...prev, meal]
    );
  };

  // Check if meal was recently eaten
  const wasRecentlyEaten = (meal) => {
    const recent = mealHistory.slice(0, 7);
    return recent.includes(meal);
  };

  // Get recipe for a meal
  const getRecipe = async (meal) => {
    setLoadingRecipe(true);
    setSelectedRecipe({ name: meal, data: null });
    setShowRecipeModal(true);

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Provide a detailed recipe for: ${meal}

Return ONLY a JSON object with this exact structure (no markdown, no extra text):
{
  "ingredients": ["ingredient 1", "ingredient 2", "ingredient 3"],
  "instructions": ["step 1", "step 2", "step 3"],
  "cookTime": "30 minutes",
  "calories": "~400 calories"
}`
          }]
        })
      });

      const data = await response.json();
      const text = data.content.filter(i => i.type === "text").map(i => i.text).join("");
      const cleanText = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      const recipe = JSON.parse(cleanText);
      
      setSelectedRecipe({ name: meal, data: recipe });
    } catch (error) {
      console.error('Error getting recipe:', error);
      alert('Failed to load recipe. Please try again!');
      setShowRecipeModal(false);
    } finally {
      setLoadingRecipe(false);
    }
  };

  // Share week plan
  const shareWeekPlan = () => {
    const planData = btoa(JSON.stringify(weeklyMeals));
    const url = `${window.location.origin}${window.location.pathname}?plan=${planData}`;
    setShareUrl(url);
    setShowShareDialog(true);
    navigator.clipboard.writeText(url);
  };

  // Load shared plan from URL
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const planData = params.get('plan');
    if (planData) {
      try {
        const decodedPlan = JSON.parse(atob(planData));
        setWeeklyMeals(decodedPlan);
        alert('✨ Meal plan loaded from shared link!');
      } catch (error) {
        console.error('Error loading shared plan:', error);
      }
    }
  }, []);

  const addMealToDay = (day, mealType, mealName) => {
    if (!mealName.trim()) return;
    
    setWeeklyMeals(prev => ({
      ...prev,
      [day]: {
        ...prev[day],
        [mealType]: [...prev[day][mealType], mealName.trim()]
      }
    }));
  };

  const removeMealFromDay = (day, mealType, index) => {
    setWeeklyMeals(prev => ({
      ...prev,
      [day]: {
        ...prev[day],
        [mealType]: prev[day][mealType].filter((_, i) => i !== index)
      }
    }));
  };

  const getAllMealsForType = (type) => {
    const allMeals = [];
    daysOfWeek.forEach(day => {
      weeklyMeals[day][type].forEach(meal => {
        if (!allMeals.includes(meal)) {
          allMeals.push(meal);
        }
      });
    });
    return allMeals;
  };

  const generateSuggestions = async () => {
    if (!groceries.trim()) return;
    
    setGenerating(true);
    setShowAiSuggestions(false);
    
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [
            { 
              role: "user", 
              content: `Based on these available groceries: "${groceries}"

Generate meal suggestions that can be made with these ingredients. Return ONLY a JSON object with this exact structure (no markdown):

{
  "breakfast": ["dish1", "dish2", "dish3", "dish4", "dish5"],
  "lunch": ["dish1", "dish2", "dish3", "dish4", "dish5"],
  "dinner": ["dish1", "dish2", "dish3", "dish4", "dish5"]
}

Each array should have exactly 5 realistic, delicious meal suggestions that use the available groceries.`
            }
          ],
        })
      });

      const data = await response.json();
      const textContent = data.content
        .filter(item => item.type === "text")
        .map(item => item.text)
        .join("");
      
      const cleanText = textContent.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      const suggestions = JSON.parse(cleanText);
      setAiSuggestions(suggestions);
      setShowAiSuggestions(true);
      
    } catch (error) {
      console.error('Error generating suggestions:', error);
      alert('Failed to generate suggestions. Please try again!');
    } finally {
      setGenerating(false);
    }
  };

  const spinWheel = () => {
    let availableMeals = getAllMealsForType(mealType);
    availableMeals = availableMeals.filter(meal => !excludeList.includes(meal));
    
    if (availableMeals.length === 0) {
      alert(`Add some ${mealType} options first! 🍽️`);
      return;
    }

    setSpinning(true);
    setSelectedMeal(null);
    setShowConfetti(false);

    const spins = 5 + Math.random() * 3;
    const newRotation = wheelRotation + (360 * spins);
    setWheelRotation(newRotation);

    setTimeout(() => {
      const weightedMeals = [];
      availableMeals.forEach(meal => {
        const isFavorite = favorites.includes(meal);
        const isRecent = wasRecentlyEaten(meal);
        const weight = isFavorite ? 3 : (isRecent ? 0.5 : 1);
        const count = Math.ceil(weight);
        
        for (let i = 0; i < count; i++) {
          weightedMeals.push(meal);
        }
      });
      
      const randomIndex = Math.floor(Math.random() * weightedMeals.length);
      const chosenMeal = weightedMeals[randomIndex];
      
      setSelectedMeal(chosenMeal);
      setSpinning(false);
      setShowConfetti(true);
      setMealHistory(prev => [chosenMeal, ...prev].slice(0, 50));
      
      setTimeout(() => setShowConfetti(false), 3000);
    }, 2000);
  };

  const DayInput = ({ day }) => {
    const [inputValue, setInputValue] = useState('');
    const isExpanded = expandedDay === day;

    return (
      <div style={{
        background: 'white',
        borderRadius: '15px',
        marginBottom: '1rem',
        boxShadow: '0 4px 10px rgba(0,0,0,0.1)',
        overflow: 'hidden',
        border: isExpanded ? `3px solid ${colors[mealType]}` : '3px solid transparent',
        transition: 'all 0.3s ease'
      }}>
        <button
          onClick={() => setExpandedDay(isExpanded ? null : day)}
          style={{
            width: '100%',
            padding: '1.25rem',
            background: isExpanded ? `${colors[mealType]}15` : 'transparent',
            border: 'none',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            cursor: 'pointer',
            fontFamily: 'inherit',
            fontSize: '1.2rem',
            fontWeight: 600,
            color: isExpanded ? colors[mealType] : '#333',
            transition: 'all 0.3s ease'
          }}
        >
          <span>{day}</span>
          {isExpanded ? <ChevronUp size={24} /> : <ChevronDown size={24} />}
        </button>

        {isExpanded && (
          <div style={{ padding: '1.5rem', paddingTop: '0.5rem' }}>
            {['breakfast', 'lunch', 'dinner'].map(type => (
              <div key={type} style={{ marginBottom: '1.5rem' }}>
                <div style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '0.5rem',
                  marginBottom: '0.75rem'
                }}>
                  {type === 'breakfast' && <Coffee size={18} color={colors.breakfast} />}
                  {type === 'lunch' && <Sun size={18} color={colors.lunch} />}
                  {type === 'dinner' && <Moon size={18} color={colors.dinner} />}
                  <span style={{
                    fontWeight: 600,
                    color: colors[type],
                    fontSize: '1rem'
                  }}>
                    {type.charAt(0).toUpperCase() + type.slice(1)}
                  </span>
                </div>

                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.5rem' }}>
                  <input
                    type="text"
                    placeholder={`Add ${type}...`}
                    value={type === mealType ? inputValue : ''}
                    onChange={(e) => type === mealType && setInputValue(e.target.value)}
                    onFocus={() => setMealType(type)}
                    onKeyPress={(e) => {
                      if (e.key === 'Enter' && inputValue.trim()) {
                        addMealToDay(day, type, inputValue);
                        setInputValue('');
                      }
                    }}
                    style={{
                      flex: 1,
                      padding: '0.75rem',
                      border: `2px solid ${colors[type]}40`,
                      borderRadius: '10px',
                      fontSize: '0.95rem',
                      fontFamily: 'inherit',
                      outline: 'none'
                    }}
                  />
                  <button
                    onClick={() => {
                      if (type === mealType && inputValue.trim()) {
                        addMealToDay(day, type, inputValue);
                        setInputValue('');
                      }
                    }}
                    style={{
                      padding: '0.75rem',
                      background: gradients[type],
                      border: 'none',
                      borderRadius: '10px',
                      cursor: 'pointer',
                      color: 'white'
                    }}
                  >
                    <Plus size={20} />
                  </button>
                </div>

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                  {weeklyMeals[day][type].map((meal, index) => (
                    <div
                      key={index}
                      style={{
                        background: `${colors[type]}20`,
                        padding: '0.5rem 0.75rem',
                        borderRadius: '15px',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.5rem',
                        fontSize: '0.9rem',
                        color: colors[type],
                        fontWeight: 600,
                        position: 'relative'
                      }}
                    >
                      <span>{meal}</span>
                      
                      <button
                        onClick={() => toggleFavorite(meal)}
                        style={{
                          background: 'transparent',
                          border: 'none',
                          cursor: 'pointer',
                          padding: 0,
                          display: 'flex'
                        }}
                        title="Mark as favorite"
                      >
                        <Heart 
                          size={14} 
                          fill={favorites.includes(meal) ? colors[type] : 'none'}
                          color={colors[type]}
                        />
                      </button>
                      
                      <button
                        onClick={() => toggleExclude(meal)}
                        style={{
                          background: 'transparent',
                          border: 'none',
                          cursor: 'pointer',
                          padding: 0,
                          display: 'flex'
                        }}
                        title="Exclude from spins"
                      >
                        <Ban 
                          size={14} 
                          color={excludeList.includes(meal) ? '#f44336' : colors[type]}
                          opacity={excludeList.includes(meal) ? 1 : 0.5}
                        />
                      </button>
                      
                      <button
                        onClick={() => removeMealFromDay(day, type, index)}
                        style={{
                          background: 'transparent',
                          border: 'none',
                          cursor: 'pointer',
                          color: colors[type],
                          display: 'flex',
                          padding: 0
                        }}
                      >
                        <X size={14} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{
      minHeight: '100vh',
      background: 'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)',
      padding: '1.5rem',
      fontFamily: '"Fredoka", "Comic Sans MS", cursive',
      position: 'relative',
      overflow: 'hidden'
    }}>
      {/* Floating decorative elements */}
      <div style={{
        position: 'absolute',
        top: '10%',
        left: '5%',
        fontSize: '4rem',
        opacity: 0.2,
        animation: 'float 6s ease-in-out infinite'
      }}>🍳</div>
      <div style={{
        position: 'absolute',
        top: '60%',
        right: '10%',
        fontSize: '3rem',
        opacity: 0.2,
        animation: 'float 5s ease-in-out infinite 1s'
      }}>🍕</div>
      <div style={{
        position: 'absolute',
        bottom: '20%',
        left: '15%',
        fontSize: '3.5rem',
        opacity: 0.2,
        animation: 'float 7s ease-in-out infinite 2s'
      }}>🍜</div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        @keyframes float {
          0%, 100% { transform: translateY(0px) rotate(0deg); }
          50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        @keyframes wheelSpin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-10px); }
        }
        
        @keyframes confetti {
          0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
          100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }

        @keyframes slideDown {
          from { 
            opacity: 0;
            transform: translateY(-20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .suggestion-chip {
          transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
          transform: scale(1.05);
        }
      `}</style>

      {/* Confetti */}
      {showConfetti && [...Array(40)].map((_, i) => (
        <div
          key={i}
          style={{
            position: 'absolute',
            left: `${Math.random() * 100}%`,
            top: '-10px',
            width: '12px',
            height: '12px',
            background: ['#FF6B9D', '#FFA62B', '#845EC2', '#4FFBDF', '#FFD93D', '#FF9CEE'][Math.floor(Math.random() * 6)],
            borderRadius: Math.random() > 0.5 ? '50%' : '0',
            animation: `confetti ${2 + Math.random() * 2}s linear`,
            animationDelay: `${Math.random() * 0.5}s`
          }}
        />
      ))}

      <div style={{
        maxWidth: '1400px',
        margin: '0 auto',
        position: 'relative',
        zIndex: 1
      }}>
        {/* Header */}
        <div style={{
          textAlign: 'center',
          marginBottom: '2rem'
        }}>
          <h1 style={{
            fontSize: 'clamp(2.5rem, 8vw, 4rem)',
            fontWeight: 700,
            color: 'white',
            textShadow: '4px 4px 0px rgba(0,0,0,0.2)',
            margin: '0 0 0.5rem 0',
            animation: 'bounce 2s ease-in-out infinite'
          }}>
            🎰 Meal Roulette 🎰
          </h1>
          <p style={{
            fontSize: 'clamp(1rem, 3vw, 1.3rem)',
            color: 'rgba(255,255,255,0.9)',
            fontWeight: 600,
            textShadow: '2px 2px 0px rgba(0,0,0,0.1)'
          }}>
            Plan your week, spin the wheel, and let fate decide your meals!
          </p>
        </div>

        {/* Toolbar */}
        <div style={{
          background: 'rgba(255, 255, 255, 0.95)',
          borderRadius: '20px',
          padding: '1rem',
          marginBottom: '1.5rem',
          boxShadow: '0 8px 20px rgba(0, 0, 0, 0.2)',
          display: 'flex',
          gap: '0.75rem',
          flexWrap: 'wrap',
          justifyContent: 'center'
        }}>
          <button
            onClick={() => setShowHistory(!showHistory)}
            style={{
              padding: '0.75rem 1.25rem',
              background: 'linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%)',
              border: 'none',
              borderRadius: '12px',
              color: 'white',
              fontWeight: 600,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '0.5rem',
              fontFamily: 'inherit',
              fontSize: '0.9rem'
            }}
          >
            <History size={16} />
            History ({mealHistory.length})
          </button>

          <button
            onClick={() => setShowSettings(!showSettings)}
            style={{
              padding: '0.75rem 1.25rem',
              background: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
              border: 'none',
              borderRadius: '12px',
              color: 'white',
              fontWeight: 600,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '0.5rem',
              fontFamily: 'inherit',
              fontSize: '0.9rem'
            }}
          >
            <Settings size={16} />
            Settings
          </button>

          <button
            onClick={shareWeekPlan}
            style={{
              padding: '0.75rem 1.25rem',
              background: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
              border: 'none',
              borderRadius: '12px',
              color: 'white',
              fontWeight: 600,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '0.5rem',
              fontFamily: 'inherit',
              fontSize: '0.9rem'
            }}
          >
            <Share2 size={16} />
            Share
          </button>
        </div>

        {/* Modal Dialogs */}
        {(showSettings || showHistory || showShareDialog || showRecipeModal) && (
          <div style={{
            position: 'fixed',
            top: 0,
            left: 0,
            right: 0,
            bottom: 0,
            background: 'rgba(0,0,0,0.7)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            zIndex: 1000,
            padding: '1rem'
          }} onClick={() => {
            setShowSettings(false);
            setShowHistory(false);
            setShowShareDialog(false);
            setShowRecipeModal(false);
          }}>
            <div style={{
              background: 'white',
              borderRadius: '20px',
              padding: '2rem',
              maxWidth: '600px',
              width: '100%',
              maxHeight: '80vh',
              overflow: 'auto',

                    <button
                      onClick={() => getRecipe(selectedMeal)}
                      style={{
                        padding: '0.65rem 1.25rem',
                        background: 'rgba(255,255,255,0.3)',
                        border: '2px solid white',
                        borderRadius: '20px',
                        color: 'white',
                        fontSize: '0.9rem',
                        fontWeight: 600,
                        cursor: 'pointer',
                        transition: 'all 0.3s ease',
                        fontFamily: 'inherit',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.5rem'
                      }}
                    >
                      <BookOpen size={16} />
                      Get Recipe
                    </button>
                    
                    <button
                      onClick={spinWheel}
                      style={{
                        padding: '0.65rem 1.25rem',
                        background: 'rgba(255,255,255,0.3)',
                        border: '2px solid white',
                        borderRadius: '20px',
                        color: 'white',
                        fontSize: '0.9rem',
                        fontWeight: 600,
                        cursor: 'pointer',
                        transition: 'all 0.3s ease',
                        fontFamily: 'inherit',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.5rem'
                      }}
                    >
                      <RotateCw size={16} />
                      Spin Again
                    </button>
                  </div>
                  
                  {wasRecentlyEaten(selectedMeal) && (
                    <div style={{
                      fontSize: '0.85rem',
                      color: 'rgba(255,255,255,0.7)',
                      fontStyle: 'italic'
                    }}>
                      ⚠️ You had this recently
                    </div>
                  )}
                </div>
              )}

              {!selectedMeal && !spinning && getAllMealsForType(mealType).length === 0 && (
                <div style={{
                  textAlign: 'center',
                  color: '#999',
                  fontSize: '1rem',
                  fontStyle: 'italic'
                }}>
                  Add some {mealType} options to start spinning! 👈
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Footer Info */}
        <div style={{
          marginTop: '1.5rem',
          textAlign: 'center',
          color: 'white',
          fontSize: '0.9rem',
          opacity: 0.85,
          fontWeight: 600
        }}>
          💡 Pro Tip: Plan your whole week by adding options for each day, then let the wheel surprise you daily!
        </div>
      </div>
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(MealRoulette));
        lucide.createIcons();
    </script>
</body>
</html>
